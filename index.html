<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM 3D · РАСШИРЕННЫЕ НАСТРОЙКИ</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; color: #fff; }
        #info {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px;
            border-left: 6px solid #f70; z-index: 100; font-size: 22px; border-radius: 0 12px 12px 0;
            box-shadow: 0 0 20px rgba(255,100,0,0.3);
        }
        #ammo { color: #ffb347; text-shadow: 0 0 10px #ff9900; }
        #health { color: #ff4d4d; text-shadow: 0 0 10px #ff0000; }
        #playersOnline { color: #7fffd4; margin-left: 15px; text-shadow: 0 0 10px #00ffff; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 48px; color: #ff0000; z-index: 50; pointer-events: none;
            text-shadow: 0 0 20px #ff0000;
            transition: all 0.2s;
        }
        #crosshair.crosshair-dot { font-size: 24px; content: "•"; }
        #crosshair.crosshair-circle { font-size: 40px; content: "○"; }
        
        #menuPanel {
            position: absolute; bottom: 30px; right: 30px; background: rgba(20,20,30,0.95);
            border: 3px solid #d97c2b; padding: 25px; width: 320px; z-index: 200;
            border-radius: 15px; box-shadow: 0 0 40px #f90; backdrop-filter: blur(10px);
            transition: all 0.3s;
        }
        #menuPanel h3 { margin: 0 0 20px; color: #f90; text-align: center; font-size: 24px; }
        
        .menu-tabs {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #f90;
            padding-bottom: 10px;
        }
        .menu-tab {
            flex: 1; text-align: center; padding: 8px; cursor: pointer; color: #ca9;
            border-radius: 8px 8px 0 0; transition: all 0.2s;
        }
        .menu-tab.active { color: #f90; border-bottom: 3px solid #f90; font-weight: bold; }
        
        .menu-section { display: none; }
        .menu-section.active { display: block; }
        
        .setting-item {
            margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px;
        }
        .setting-item label { display: block; color: #ffaa00; margin-bottom: 8px; font-size: 16px; }
        .setting-item input[type=range] {
            width: 100%; height: 8px; background: #333; border-radius: 4px;
            -webkit-appearance: none; accent-color: #f90;
        }
        .setting-item input[type=color] {
            width: 100%; height: 40px; border: 2px solid #f90; border-radius: 8px;
            background: transparent; cursor: pointer;
        }
        .setting-item select {
            width: 100%; padding: 10px; background: #2a1f15; color: #ca9;
            border: 2px solid #a55; border-radius: 8px; font-size: 16px;
        }
        .value-display {
            float: right; color: #7fffd4; font-weight: bold;
        }
        
        .weapon-selector {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
        }
        .weapon-btn {
            background: #2a1f15; color: #ca9; border: 2px solid #a55; padding: 12px;
            cursor: pointer; font-size: 16px; flex: 1 0 45%; border-radius: 8px;
            transition: all 0.2s; text-align: center;
        }
        .weapon-btn:hover { background: #b55f2a; color: #fff; border-color: #fd9; }
        .weapon-btn.active { background: #b55f2a; color: #fff; border-color: #fd9; box-shadow: 0 0 20px #f90; }
        
        #status {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px;
            border: 2px solid #0f0; color: #0f0; z-index: 100; border-radius: 30px;
            font-size: 18px; box-shadow: 0 0 20px #0f0;
        }
        .instruction { 
            position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px 25px; 
            color: #ffaa00; z-index: 100; border-radius: 30px; border-left: 6px solid #f70;
            font-size: 18px; box-shadow: 0 0 20px rgba(255,150,0,0.3);
        }
        #minimap {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); border: 3px solid #f90; width: 200px; height: 200px;
            border-radius: 50%; z-index: 150; overflow: hidden; box-shadow: 0 0 30px #f90;
            display: none;
        }
        #fps-counter {
            position: absolute; top: 20px; right: 200px; background: rgba(0,0,0,0.7);
            padding: 8px 15px; border-radius: 20px; color: #0f0; font-size: 18px;
            border: 1px solid #0f0;
        }
    </style>
</head>
<body>
    <div id="info">❤️ <span id="health">150</span> 🔫 <span id="ammo">30/30</span> 👥 <span id="playersOnline">1</span>/8</div>
    <div id="fps-counter">FPS: <span id="fpsValue">60</span></div>
    <div id="status">🔄 ПОДКЛЮЧЕНИЕ...</div>
    <div id="crosshair">+</div>
    <div id="minimap"></div>
    <div class="instruction">WASD — ходьба | ПРОБЕЛ — прыжок | ЛКМ — огонь | ПКМ — прицел | R — перезарядка | SHIFT — бег | ESC — меню</div>
    
    <div id="menuPanel">
        <h3>⚡ МЕНЮ НАСТРОЕК ⚡</h3>
        
        <div class="menu-tabs">
            <div class="menu-tab active" data-tab="weapons">🔫 ОРУЖИЕ</div>
            <div class="menu-tab" data-tab="aim">🎯 ПРИЦЕЛ</div>
            <div class="menu-tab" data-tab="game">⚙️ УПРАВЛЕНИЕ</div>
        </div>
        
        <!-- Вкладка ОРУЖИЕ -->
        <div class="menu-section active" id="tab-weapons">
            <div class="weapon-selector">
                <button class="weapon-btn active" id="wpPistol">🔫 ПИСТОЛЕТ</button>
                <button class="weapon-btn" id="wpShotgun">🔫🔫 ДРОБОВИК</button>
                <button class="weapon-btn" id="wpRifle">⚡ ВИНТОВКА</button>
                <button class="weapon-btn" id="wpRocket">💥 РОКЕТНИЦА</button>
            </div>
            <div style="margin-top: 20px; color: #ffaa00; font-size: 18px;">
                👾 ВРАГОВ: <span id="enemyCount">12</span><br>
                🏆 УРОВЕНЬ: <span id="level">1</span><br>
                🟢 ОНЛАЙН: <span id="onlineCount">1</span>/8
            </div>
        </div>
        
        <!-- Вкладка ПРИЦЕЛ -->
        <div class="menu-section" id="tab-aim">
            <div class="setting-item">
                <label>🎯 ФОРМА ПРИЦЕЛА <span class="value-display" id="crosshairStyleVal">Плюс</span></label>
                <select id="crosshairStyle">
                    <option value="plus" selected>➕ Плюс</option>
                    <option value="dot">• Точка</option>
                    <option value="circle">○ Круг</option>
                    <option value="cross">✖ Крест</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>🔴 ЦВЕТ ПРИЦЕЛА</label>
                <input type="color" id="crosshairColor" value="#ff0000">
            </div>
            
            <div class="setting-item">
                <label>📏 РАЗМЕР ПРИЦЕЛА <span class="value-display" id="crosshairSizeVal">48</span></label>
                <input type="range" id="crosshairSize" min="24" max="72" value="48" step="2">
            </div>
            
            <div class="setting-item">
                <label>✨ ПРОЗРАЧНОСТЬ <span class="value-display" id="crosshairOpacityVal">100%</span></label>
                <input type="range" id="crosshairOpacity" min="0.3" max="1" value="1" step="0.1">
            </div>
        </div>
        
        <!-- Вкладка УПРАВЛЕНИЕ -->
        <div class="menu-section" id="tab-game">
            <div class="setting-item">
                <label>🖱️ ЧУВСТВИТЕЛЬНОСТЬ <span class="value-display" id="sensVal">2.0</span></label>
                <input type="range" id="mouseSens" min="0.5" max="5.0" value="2.0" step="0.1">
            </div>
            
            <div class="setting-item">
                <label>🏃 СКОРОСТЬ БЕГА <span class="value-display" id="speedVal">0.15</span></label>
                <input type="range" id="moveSpeed" min="0.1" max="0.3" value="0.15" step="0.01">
            </div>
            
            <div class="setting-item">
                <label>🦘 СИЛА ПРЫЖКА <span class="value-display" id="jumpVal">0.2</span></label>
                <input type="range" id="jumpPower" min="0.1" max="0.4" value="0.2" step="0.01">
            </div>
            
            <div class="setting-item">
                <label>🎮 ПОКАЗЫВАТЬ FPS</label>
                <select id="showFPS">
                    <option value="yes" selected>✅ Да</option>
                    <option value="no">❌ Нет</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>🗺️ ПОКАЗЫВАТЬ МИНИ-КАРТУ</label>
                <select id="showMinimap">
                    <option value="no" selected>❌ Нет</option>
                    <option value="yes">✅ Да</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top: 15px; color: #7fffd4; font-size: 14px; text-align: center;">
            🎮 IP: 192.168.1.100:3000<br>
            (для локальной сети)
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/exitgames/photon-javascript-sdk@master/dist/Photon-Javascript_SDK.min.js"></script>

    <script>
    // ВАШ APPID
    const APP_ID = '3ca34565-20d7-4bfe-81e1-b6528497e620';
    const ROOM_NAME = 'DOOM_ARENA_' + Math.floor(Math.random() * 1000);
    
    // ===== НАСТРОЙКИ ПО УМОЛЧАНИЮ =====
    let settings = {
        mouseSens: 2.0,
        moveSpeed: 0.15,
        jumpPower: 0.2,
        crosshairStyle: 'plus',
        crosshairColor: '#ff0000',
        crosshairSize: 48,
        crosshairOpacity: 1,
        showFPS: 'yes',
        showMinimap: 'no'
    };
    
    // ===== УЛУЧШЕННАЯ ГРАФИКА =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0f14);
    scene.fog = new THREE.Fog(0x0a0f14, 30, 100);
    
    const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ===== СИСТЕМА ЧАСТИЦ =====
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 1000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount; i++) {
        positions[i*3] = (Math.random() - 0.5) * 200;
        positions[i*3+1] = Math.random() * 50;
        positions[i*3+2] = (Math.random() - 0.5) * 200;
        
        colors[i*3] = 1.0;
        colors[i*3+1] = 0.3 + Math.random() * 0.5;
        colors[i*3+2] = 0.1;
    }
    
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    
    const particleMat = new THREE.PointsMaterial({ 
        size: 0.3, vertexColors: true, transparent: true, opacity: 0.4,
        blending: THREE.AdditiveBlending
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ===== ОСВЕЩЕНИЕ =====
    const ambient = new THREE.AmbientLight(0x404060, 0.6);
    scene.add(ambient);
    
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(20, 40, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);
    
    // Атмосферные огни
    const redLight = new THREE.PointLight(0x442200, 2, 60);
    redLight.position.set(-15, 10, -20);
    scene.add(redLight);
    
    const blueLight = new THREE.PointLight(0x224466, 1.5, 60);
    blueLight.position.set(15, 10, 10);
    scene.add(blueLight);

    // ===== ОГРОМНАЯ КАРТА =====
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x3a2e22, roughness: 0.8 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    const gridHelper = new THREE.GridHelper(80, 40, 0xaa8866, 0x664422);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // ===== СТЕНЫ =====
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x7a5a3a });
    
    const northWall = new THREE.Mesh(new THREE.BoxGeometry(82, 10, 2), wallMat);
    northWall.position.set(0, 5, -40);
    northWall.castShadow = true;
    northWall.receiveShadow = true;
    scene.add(northWall);
    
    const southWall = new THREE.Mesh(new THREE.BoxGeometry(82, 10, 2), wallMat);
    southWall.position.set(0, 5, 40);
    southWall.castShadow = true;
    southWall.receiveShadow = true;
    scene.add(southWall);
    
    const westWall = new THREE.Mesh(new THREE.BoxGeometry(2, 10, 82), wallMat);
    westWall.position.set(-40, 5, 0);
    westWall.castShadow = true;
    westWall.receiveShadow = true;
    scene.add(westWall);
    
    const eastWall = new THREE.Mesh(new THREE.BoxGeometry(2, 10, 82), wallMat);
    eastWall.position.set(40, 5, 0);
    eastWall.castShadow = true;
    eastWall.receiveShadow = true;
    scene.add(eastWall);

    // ===== КОЛОННЫ =====
    const pillarGeo = new THREE.CylinderGeometry(1, 1.2, 8);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x885533, emissive: 0x221100 });
    
    for (let x = -30; x <= 30; x += 10) {
        for (let z = -30; z <= 30; z += 10) {
            if (Math.random() > 0.3) {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(x, 4, z);
                pillar.castShadow = true;
                pillar.receiveShadow = true;
                scene.add(pillar);
                
                const light = new THREE.PointLight(0xff6600, 1, 15);
                light.position.set(x, 7, z);
                scene.add(light);
            }
        }
    }

    // ===== ВРАГИ =====
    function createEnemy(x, z, level = 1) {
        const group = new THREE.Group();
        
        const bodyGeo = new THREE.CylinderGeometry(0.8, 0.9, 2.2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x7a3a2a, emissive: 0x221100 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.1;
        body.castShadow = true;
        body.receiveShadow = true;
        group.add(body);
        
        const headGeo = new THREE.SphereGeometry(0.55);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x9a5a3a, emissive: 0x331100 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 2.4;
        head.castShadow = true;
        group.add(head);
        
        const eyeGeo = new THREE.SphereGeometry(0.15);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff3300, emissive: 0x550000 });
        
        const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
        eyeL.position.set(-0.25, 2.5, 0.5);
        group.add(eyeL);
        
        const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
        eyeR.position.set(0.25, 2.5, 0.5);
        group.add(eyeR);
        
        group.position.set(x, 0, z);
        return group;
    }

    const enemies = [];
    for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const radius = 20 + Math.random() * 15;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        
        const enemy = createEnemy(x, z, Math.floor(Math.random() * 3) + 1);
        scene.add(enemy);
        enemies.push({ 
            mesh: enemy, 
            health: 50 + Math.floor(Math.random() * 50),
            alive: true,
            speed: 0.02 + Math.random() * 0.02
        });
    }

    // ===== ОРУЖИЕ =====
    const weaponGroup = new THREE.Group();
    camera.add(weaponGroup);
    scene.add(camera);

    const materials = {
        steel: new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 }),
        darkSteel: new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.2, metalness: 0.9 }),
        wood: new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 }),
        gold: new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0x331100 })
    };

    function createPistol() {
        weaponGroup.clear();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.25, 1.0), materials.steel);
        body.position.set(0.5, -0.2, -0.6);
        body.castShadow = true;
        weaponGroup.add(body);
        
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.7, 0.3), materials.wood);
        handle.position.set(0.5, -0.7, -0.3);
        handle.castShadow = true;
        weaponGroup.add(handle);
        
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.9), materials.darkSteel);
        barrel.rotation.x = Math.PI/2;
        barrel.position.set(0.5, -0.1, -1.1);
        barrel.castShadow = true;
        weaponGroup.add(barrel);
    }

    function createShotgun() {
        weaponGroup.clear();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.25, 1.4), materials.steel);
        body.position.set(0.6, -0.2, -0.8);
        body.castShadow = true;
        weaponGroup.add(body);
        
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.6, 0.3), materials.wood);
        handle.position.set(0.6, -0.7, -0.4);
        handle.castShadow = true;
        weaponGroup.add(handle);
        
        for (let i = 0; i < 2; i++) {
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 1.2), materials.darkSteel);
            barrel.rotation.x = Math.PI/2;
            barrel.position.set(0.45 + i*0.25, -0.15, -1.4);
            barrel.castShadow = true;
            weaponGroup.add(barrel);
        }
    }

    function createRifle() {
        weaponGroup.clear();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 2.0), materials.steel);
        body.position.set(0.6, -0.2, -1.2);
        body.castShadow = true;
        weaponGroup.add(body);
        
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.3), materials.wood);
        grip.position.set(0.6, -0.7, -0.5);
        grip.castShadow = true;
        weaponGroup.add(grip);
        
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.5), materials.darkSteel);
        barrel.rotation.x = Math.PI/2;
        barrel.position.set(0.6, -0.15, -2.0);
        barrel.castShadow = true;
        weaponGroup.add(barrel);
    }

    function createRocketLauncher() {
        weaponGroup.clear();
        const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.8), materials.steel);
        tube.rotation.x = Math.PI/2;
        tube.position.set(0.6, -0.2, -1.2);
        tube.castShadow = true;
        weaponGroup.add(tube);
        
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), materials.wood);
        grip.position.set(0.6, -0.7, -0.5);
        grip.castShadow = true;
        weaponGroup.add(grip);
        
        const rocket = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.8), 0xff5500);
        rocket.rotation.x = Math.PI/2;
        rocket.position.set(0.6, -0.2, -1.8);
        rocket.castShadow = true;
        weaponGroup.add(rocket);
    }

    createPistol();

    // ===== ПУЛИ =====
    const bullets = [];
    
    function createBullet(startPos, direction, type = 'pistol') {
        const bullet = new THREE.Mesh(
            new THREE.SphereGeometry(type === 'rocket' ? 0.2 : 0.1),
            new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 })
        );
        bullet.position.copy(startPos);
        bullet.castShadow = true;
        scene.add(bullet);
        
        bullets.push({
            mesh: bullet,
            velocity: direction.clone().multiplyScalar(type === 'rocket' ? 0.5 : 0.8),
            life: type === 'rocket' ? 100 : 60
        });
    }

    function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.mesh.position.add(b.velocity);
            b.life--;
            
            for (let j = 0; j < enemies.length; j++) {
                const enemy = enemies[j];
                if (!enemy.alive) continue;
                
                const dist = b.mesh.position.distanceTo(enemy.mesh.position);
                if (dist < 1.5) {
                    enemy.health -= 25;
                    if (enemy.health <= 0) {
                        enemy.alive = false;
                        scene.remove(enemy.mesh);
                    }
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                    break;
                }
            }
            
            if (b.life <= 0) {
                scene.remove(b.mesh);
                bullets.splice(i, 1);
            }
        }
    }

    // ===== МУЛЬТИПЛЕЕР =====
    let photon = null;
    let myId = null;
    let otherPlayers = new Map();
    
    function initMultiplayer() {
        try {
            photon = new Photon.LoadBalancing.LoadBalancingClient(
                Photon.ConnectionProtocol.Wss,
                APP_ID,
                '1.0'
            );
            
            photon.connectToRegion('eu');
            
            photon.addEventListener(Photon.LoadBalancing.EventName.CONNECTED_TO_MASTER, () => {
                document.getElementById('status').innerText = '🟢 ПОДКЛЮЧЕНО';
                photon.opJoinRandomOrCreateRoom(null, { maxPlayers: 8 });
            });
            
            photon.addEventListener(Photon.LoadBalancing.EventName.JOINED_ROOM, () => {
                document.getElementById('status').innerText = '🎮 В КОМНАТЕ';
                myId = photon.myActor().actorNr;
                
                photon.actors.getAll().forEach(actor => {
                    if (!actor.isLocal) {
                        createOtherPlayer(actor.actorNr);
                    }
                });
                
                updatePlayersCount();
            });
            
            photon.addEventListener(Photon.LoadBalancing.EventName.ACTOR_JOINED, (actor) => {
                if (!actor.isLocal) {
                    createOtherPlayer(actor.actorNr);
                }
                updatePlayersCount();
            });
            
            photon.addEventListener(Photon.LoadBalancing.EventName.ACTOR_LEFT, (actor) => {
                removeOtherPlayer(actor.actorNr);
                updatePlayersCount();
            });
            
            photon.addEventListener(Photon.LoadBalancing.EventName.RAISE_EVENT, (code, data, actorNr) => {
                const player = otherPlayers.get(actorNr);
                if (!player) return;
                
                if (code === 1) {
                    player.mesh.position.set(data.x, data.y, data.z);
                    player.mesh.rotation.y = data.rotY;
                }
            });
            
        } catch(e) {
            document.getElementById('status').innerText = '⚠️ ОФФЛАЙН';
        }
    }

    function createOtherPlayer(id) {
        const group = new THREE.Group();
        
        const body = new THREE.Mesh(
            new THREE.CylinderGeometry(0.7, 0.8, 2.0),
            new THREE.MeshStandardMaterial({ color: 0x3366ff })
        );
        body.position.y = 1.0;
        body.castShadow = true;
        group.add(body);
        
        const head = new THREE.Mesh(
            new THREE.SphereGeometry(0.5),
            new THREE.MeshStandardMaterial({ color: 0x44aaff })
        );
        head.position.y = 2.2;
        group.add(head);
        
        scene.add(group);
        otherPlayers.set(id, { mesh: group });
    }

    function removeOtherPlayer(id) {
        const player = otherPlayers.get(id);
        if (player) {
            scene.remove(player.mesh);
            otherPlayers.delete(id);
        }
    }

    function updatePlayersCount() {
        const count = photon && photon.myRoom() ? photon.actors.count : 1;
        document.getElementById('playersOnline').innerText = count;
        document.getElementById('onlineCount').innerText = count;
    }

    // ===== ИГРОВЫЕ ПЕРЕМЕННЫЕ =====
    let health = 150;
    let ammo = 30;
    let maxAmmo = 30;
    let currentWeapon = 'pistol';
    let isReloading = false;
    let isRunning = false;
    const keys = {};
    let mouseX = 0, mouseY = 0;
    let pitch = 0, yaw = 0;
    let isAiming = false;
    
    // Физика прыжка
    let velocityY = 0;
    let onGround = true;
    const gravity = 0.02;
    
    // UI элементы
    const healthSpan = document.getElementById('health');
    const ammoSpan = document.getElementById('ammo');
    const enemyCountSpan = document.getElementById('enemyCount');
    const crosshairEl = document.getElementById('crosshair');

    // ===== УПРАВЛЕНИЕ =====
    window.addEventListener('keydown', (e) => { 
        keys[e.code] = true; 
        
        // ESC для меню
        if (e.code === 'Escape') {
            document.exitPointerLock();
        }
    });
    
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });
    
    window.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === renderer.domElement) {
            const sens = isAiming ? settings.mouseSens * 0.5 : settings.mouseSens;
            mouseX = e.movementX * 0.002 * sens;
            mouseY = e.movementY * 0.002 * sens;
            yaw -= mouseX;
            pitch -= mouseY;
            pitch = Math.max(-1.4, Math.min(1.4, pitch));
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }
    });
    
    renderer.domElement.addEventListener('click', () => {
        renderer.domElement.requestPointerLock();
    });
    
    renderer.domElement.addEventListener('mousedown', (e) => {
        if (e.button === 0 && document.pointerLockElement === renderer.domElement) {
            if (ammo > 0 && !isReloading) {
                ammo--;
                const dir = camera.getWorldDirection(new THREE.Vector3());
                const startPos = camera.position.clone().add(dir.clone().multiplyScalar(1.5));
                createBullet(startPos, dir, currentWeapon);
                updateUI();
                
                weaponGroup.position.z += 0.1;
                setTimeout(() => weaponGroup.position.z -= 0.1, 50);
            }
        }
        if (e.button === 2) {
            isAiming = true;
            camera.fov = 50;
            camera.updateProjectionMatrix();
        }
    });
    
    renderer.domElement.addEventListener('mouseup', (e) => {
        if (e.button === 2) {
            isAiming = false;
            camera.fov = 80;
            camera.updateProjectionMatrix();
        }
    });
    
    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyR' && !isReloading) {
            isReloading = true;
            setTimeout(() => {
                ammo = maxAmmo;
                isReloading = false;
                updateUI();
            }, 1000);
        }
    });

    function updateUI() {
        healthSpan.innerText = health;
        ammoSpan.innerText = ammo + '/' + maxAmmo;
        enemyCountSpan.innerText = enemies.filter(e => e.alive).length;
    }

    function handleMovement() {
        const speed = keys['ShiftLeft'] ? settings.moveSpeed * 1.5 : settings.moveSpeed;
        
        const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        forward.y = 0;
        forward.normalize();
        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
        
        if (keys['KeyW']) camera.position.addScaledVector(forward, speed);
        if (keys['KeyS']) camera.position.addScaledVector(forward, -speed);
        if (keys['KeyA']) camera.position.addScaledVector(right, -speed);
        if (keys['KeyD']) camera.position.addScaledVector(right, speed);
        
        // Прыжок
        if (keys['Space'] && onGround) {
            velocityY = settings.jumpPower;
            onGround = false;
        }
        
        camera.position.y += velocityY;
        velocityY -= gravity;
        
        if (camera.position.y <= 1.0) {
            camera.position.y = 1.0;
            velocityY = 0;
            onGround = true;
        }
        
        camera.position.x = Math.max(-38, Math.min(38, camera.position.x));
        camera.position.z = Math.max(-38, Math.min(38, camera.position.z));
    }

    // ===== ДВИЖЕНИЕ ВРАГОВ =====
    function updateEnemies() {
        enemies.forEach(enemy => {
            if (!enemy.alive) return;
            
            const playerPos = camera.position;
            const enemyPos = enemy.mesh.position;
            
            const dx = playerPos.x - enemyPos.x;
            const dz = playerPos.z - enemyPos.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            
            if (dist < 20) {
                enemyPos.x += (dx / dist) * enemy.speed;
                enemyPos.z += (dz / dist) * enemy.speed;
                enemy.mesh.lookAt(playerPos.x, enemyPos.y, playerPos.z);
            }
        });
    }

    // ===== НАСТРОЙКИ ПРИЦЕЛА =====
    function updateCrosshair() {
        let symbol = '+';
        switch(settings.crosshairStyle) {
            case 'plus': symbol = '+'; break;
            case 'dot': symbol = '•'; break;
            case 'circle': symbol = '○'; break;
            case 'cross': symbol = '✖'; break;
        }
        crosshairEl.innerText = symbol;
        crosshairEl.style.color = settings.crosshairColor;
        crosshairEl.style.fontSize = settings.crosshairSize + 'px';
        crosshairEl.style.opacity = settings.crosshairOpacity;
    }

    // ===== ЗАПУСК =====
    initMultiplayer();

    // ===== АНИМАЦИЯ =====
    let lastTime = performance.now();
    let frames = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        
        if (document.pointerLockElement === renderer.domElement) {
            handleMovement();
        }
        
        // Отправка позиции
        if (photon && photon.myRoom() && myId) {
            photon.raiseEvent(1, {
                x: camera.position.x,
                y: camera.position.y,
                z: camera.position.z,
                rotY: camera.rotation.y
            });
        }
        
        particles.rotation.y += 0.0005;
        
        updateBullets();
        updateEnemies();
        updateUI();
        
        // FPS счетчик
        frames++;
        const now = performance.now();
        if (now - lastTime >= 1000) {
            document.getElementById('fpsValue').innerText = frames;
            frames = 0;
            lastTime = now;
        }
        
        renderer.render(scene, camera);
    }
    
    animate();

    // ===== ОБРАБОТЧИКИ НАСТРОЕК =====
    document.querySelectorAll('.menu-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
    });

    // Настройки прицела
    document.getElementById('crosshairStyle').addEventListener('change', (e) => {
        settings.crosshairStyle = e.target.value;
        document.getElementById('crosshairStyleVal').innerText = 
            e.target.options[e.target.selectedIndex].text;
        updateCrosshair();
    });

    document.getElementById('crosshairColor').addEventListener('input', (e) => {
        settings.crosshairColor = e.target.value;
        updateCrosshair();
    });

    document.getElementById('crosshairSize').addEventListener('input', (e) => {
        settings.crosshairSize = e.target.value;
        document.getElementById('crosshairSizeVal').innerText = e.target.value;
        updateCrosshair();
    });

    document.getElementById('crosshairOpacity').addEventListener('input', (e) => {
        settings.crosshairOpacity = e.target.value;
        document.getElementById('crosshairOpacityVal').innerText = 
            Math.round(e.target.value * 100) + '%';
        updateCrosshair();
    });

    // Настройки управления
    document.getElementById('mouseSens').addEventListener('input', (e) => {
        settings.mouseSens = parseFloat(e.target.value);
        document.getElementById('sensVal').innerText = settings.mouseSens.toFixed(1);
    });

    document.getElementById('moveSpeed').addEventListener('input', (e) => {
        settings.moveSpeed = parseFloat(e.target.value);
        document.getElementById('speedVal').innerText = settings.moveSpeed.toFixed(2);
    });

    document.getElementById('jumpPower').addEventListener('input', (e) => {
        settings.jumpPower = parseFloat(e.target.value);
        document.getElementById('jumpVal').innerText = settings.jumpPower.toFixed(2);
    });

    document.getElementById('showFPS').addEventListener('change', (e) => {
        document.getElementById('fps-counter').style.display = 
            e.target.value === 'yes' ? 'block' : 'none';
    });

    document.getElementById('showMinimap').addEventListener('change', (e) => {
        document.getElementById('minimap').style.display = 
            e.target.value === 'yes' ? 'block' : 'none';
    });

    // Кнопки оружия
    document.getElementById('wpPistol').addEventListener('click', () => {
        currentWeapon = 'pistol';
        createPistol();
        document.querySelectorAll('.weapon-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('wpPistol').classList.add('active');
        maxAmmo = 30; ammo = 30;
        updateUI();
    });
    
    document.getElementById('wpShotgun').addEventListener('click', () => {
        currentWeapon = 'shotgun';
        createShotgun();
        document.querySelectorAll('.weapon-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('wpShotgun').classList.add('active');
        maxAmmo = 16; ammo = 16;
        updateUI();
    });
    
    document.getElementById('wpRifle').addEventListener('click', () => {
        currentWeapon = 'rifle';
        createRifle();
        document.querySelectorAll('.weapon-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('wpRifle').classList.add('active');
        maxAmmo = 40; ammo = 40;
        updateUI();
    });
    
    document.getElementById('wpRocket').addEventListener('click', () => {
        currentWeapon = 'rocket';
        createRocketLauncher();
        document.querySelectorAll('.weapon-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('wpRocket').classList.add('active');
        maxAmmo = 8; ammo = 8;
        updateUI();
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateUI();
    </script>
</body>

</html>
